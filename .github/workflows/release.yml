name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --filter=@nestjs-modules/mailer

      - name: Run tests
        run: pnpm run test --filter=@nestjs-modules/mailer

      - name: Auto-create changeset if none exists
        run: |
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
          if [ -z "$CHANGESETS" ]; then
            echo "No changesets found, creating auto patch changeset..."
            cat > .changeset/auto-release.md << 'CHANGESET'
          ---
          '@nestjs-modules/mailer': patch
          ---

          Auto-release patch version with latest changes.
          CHANGESET
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="v${VERSION}"

            git tag "$TAG" || true
            git push origin "$TAG" || true

            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest || echo "Release $TAG already exists"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
